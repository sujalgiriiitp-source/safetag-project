<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SafeTag Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        padding: 24px;
      }

      main {
        max-width: 520px;
        border: 1px solid #cbd5e1;
        border-radius: 24px;
        padding: 32px;

        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);

  <body>
    <main>
      <h1>You are offline</h1>
      <p>SafeTag will keep recent screens cached. When connectivity returns, refresh to sync the latest custody data.</p>
    </main>
